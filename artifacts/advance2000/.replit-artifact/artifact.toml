kind = "web"
previewPath = "/"
title = "Advance2000 Vision Demo"
version = "1.0.0"
id = "artifacts/advance2000"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20121

[services.development]
run = "pnpm --filter @workspace/advance2000 run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/advance2000", "run", "build" ]
publicDir = "artifacts/advance2000/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20121"
BASE_PATH = "/"
